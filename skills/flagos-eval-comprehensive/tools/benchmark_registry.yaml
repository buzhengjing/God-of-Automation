# Benchmark Registry: 模型类型 → Benchmark 映射表
# runner 类型: evalscope (原生) / vlmeval (VLMEvalKit后端) / custom (自研脚本)
#
# thinking 字段说明（per-benchmark 粒度控制）:
#   true  — 当模型支持 thinking 时，该 benchmark 使用 thinking 配置
#   false — 该 benchmark 始终使用标准配置（即使模型支持 thinking）
#   未设置 — 等同于 false
# 该字段仅声明 benchmark 是否适合 thinking；模型是否为 thinking model 由编排器自动检测。
# Skill 层可在调用时覆盖此字段，交由智能体决策。

LLM:
  required:
    - name: mmlu
      runner: evalscope
      display_name: "MMLU_5shot"
      description: "大规模多任务语言理解 (57个学科)"
      thinking: false                            # 多选题，不需要长推理链，thinking 增加大量 token 消耗但收益有限
      reference_scores:
        Qwen3-8B: 83.0
        Qwen2.5-7B: 74.2
      args:
        few_shot_num: 5
    - name: aime24
      runner: evalscope
      display_name: "AIME24_0shot"
      description: "美国数学邀请赛 2024"
      thinking: true                             # 竞赛数学，必须 thinking 模式才能充分推理
      reference_scores:
        Qwen3-8B: 50.0
        Qwen2.5-7B: 16.7
      args:
        few_shot_num: 0
    - name: aime25
      runner: evalscope
      display_name: "AIME25_0shot"
      description: "美国数学邀请赛 2025"
      thinking: true                             # 竞赛数学
      quick: true                                # Quick 模式跑这个 benchmark
      reference_scores:
        Qwen3-8B: 30.0
      args:
        few_shot_num: 0
    - name: gpqa_diamond
      runner: evalscope
      display_name: "GPQA_Diamond_0shot"
      description: "研究生水平科学问答"
      thinking: true                             # 研究生级别科学推理，需要深度思考
      reference_scores:
        Qwen3-8B: 50.0
        Qwen2.5-7B: 36.4
      args:
        few_shot_num: 0
    - name: musr
      runner: evalscope
      display_name: "MUSR_0shot"
      description: "多步推理"
      thinking: true                             # 多步推理，适合 thinking 模式
      reference_scores: {}
      args:
        few_shot_num: 0
  optional:
    - name: livebench
      runner: custom
      display_name: "LiveBench"
      description: "实时更新评测集"
      thinking: true
      script: "custom_eval/eval_livebench.py"
    - name: math_500
      runner: evalscope
      display_name: "MATH-500_0shot"
      description: "数学推理 (500题)"
      thinking: true                             # 数学推理
      args:
        few_shot_num: 0
    - name: mmlu_pro
      runner: evalscope
      display_name: "MMLU-Pro_0shot"
      description: "MMLU 进阶版"
      thinking: false                            # 多选题，同 MMLU
      args:
        few_shot_num: 0
    - name: theoremqa
      runner: custom
      display_name: "TheoremQA"
      description: "定理证明问答"
      thinking: true                             # 定理证明需要推理链
      script: "custom_eval/eval_theoremqa.py"
    - name: gsm8k
      runner: evalscope
      display_name: "GSM8K"
      description: "小学数学推理"
      thinking: false                            # 小学数学，标准模式即可
      args:
        few_shot_num: 0
    - name: ceval
      runner: evalscope
      display_name: "CEVAL"
      description: "中文评测"
      thinking: false                            # 多选题
      args:
        few_shot_num: 0

