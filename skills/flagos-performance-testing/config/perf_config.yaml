# FlagOS Performance Testing Configuration

server:
  host: "localhost"
  port: 8000
  endpoint: "/v1/completions"

model:
  name: ""                           # Model name (required)
  tokenizer_path: ""                 # Path to tokenizer (optional)

benchmark:
  concurrency_levels: [1, 2, 4, 8, 16, 32, 64, 128, 256]
  max_prompts: 1000
  request_rate: null                 # null for unlimited

test_matrix:
  1k_input_1k_output:
    enabled: true
    input_len: 1024
    output_len: 1024
  4k_input_1k_output:
    enabled: true
    input_len: 4096
    output_len: 1024
  16k_input_1k_output:
    enabled: true
    input_len: 16384
    output_len: 1024
  32k_input_1k_output:
    enabled: false
    input_len: 32768
    output_len: 1024

paths:
  results: "output"
  history: "output/history"

tags:
  baseline: "org"
  target: "opt"

comparison:
  metrics:
    - "request_throughput"
    - "output_throughput"
    - "mean_ttft_ms"
    - "median_ttft_ms"
    - "p99_ttft_ms"
    - "mean_tpot_ms"
    - "median_tpot_ms"
    - "p99_tpot_ms"
