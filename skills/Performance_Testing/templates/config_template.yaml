# Performance Testing Configuration Template
# Copy this file to config/perf_config.yaml and modify as needed

# =============================================================================
# Server Configuration
# Replace with your actual server host and port
# =============================================================================
server:
  host: "YOUR_HOST_IP"    # e.g., "10.1.15.35" or "localhost"
  port: 8000              # e.g., 8000, 9011

# =============================================================================
# Model Configuration
# Replace with your actual model name and tokenizer path
# =============================================================================
model:
  name: "YOUR_MODEL_NAME"           # e.g., "Qwen3-4B-metax-flagos"
  tokenizer_path: "/path/to/tokenizer"  # e.g., "/nfs/Qwen3-4B"

# =============================================================================
# Benchmark Parameters (usually don't need to change)
# =============================================================================
benchmark:
  dataset_name: "random"
  endpoint: "/v1/completions"
  ignore_eos: true
  trust_remote_code: true

# =============================================================================
# Test Matrix
# Enable/disable test cases as needed
# =============================================================================
test_matrix:
  - name: "1k_input_1k_output"
    input_len: 1024
    output_len: 1024
    enabled: true

  - name: "4k_input_1k_output"
    input_len: 4096
    output_len: 1024
    enabled: true

  - name: "16k_input_1k_output"
    input_len: 16384
    output_len: 1024
    enabled: true

  - name: "32k_input_1k_output"
    input_len: 32768
    output_len: 1024
    enabled: true

# =============================================================================
# Concurrency Configuration
# =============================================================================
concurrency:
  levels: [1, 2, 4, 8, 16, 32, 64, 128, 256]
  final_num_prompts: 1000

# =============================================================================
# Output Configuration
# =============================================================================
output:
  dir: "./output"
  format: "json"
  include_timestamp: true
  include_config_snapshot: true
