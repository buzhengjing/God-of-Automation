# Performance Testing Configuration
# Version: 1.0.0
# Agent can modify this file

# =============================================================================
# Server Configuration (detect from container environment or set manually)
# =============================================================================
server:
  host: "10.1.15.35"
  port: 9011

# =============================================================================
# Model Configuration
# =============================================================================
model:
  name: "Qwen3-4B-metax-flagos"
  tokenizer_path: "/nfs/Qwen3-4B"

# =============================================================================
# Benchmark Fixed Parameters
# =============================================================================
benchmark:
  dataset_name: "random"
  endpoint: "/v1/completions"
  ignore_eos: true
  trust_remote_code: true

# =============================================================================
# Test Matrix - Input/Output Length Combinations
# =============================================================================
test_matrix:
  - name: "1k_input_1k_output"
    input_len: 1024
    output_len: 1024
    enabled: true

  - name: "4k_input_1k_output"
    input_len: 4096
    output_len: 1024
    enabled: true

  - name: "16k_input_1k_output"
    input_len: 16384
    output_len: 1024
    enabled: true

  - name: "32k_input_1k_output"
    input_len: 32768
    output_len: 1024
    enabled: true

# =============================================================================
# Concurrency Test Configuration
# =============================================================================
concurrency:
  levels: [1, 2, 4, 8, 16, 32, 64, 128, 256]
  final_num_prompts: 1000

# =============================================================================
# Output Configuration
# =============================================================================
output:
  dir: "./output"
  format: "json"  # json | csv | both
  include_timestamp: true
  include_config_snapshot: true
